name: Sync NYT bestsellers

on:
  schedule:
    # Wednesdays 06:00 UTC — NYT typically has that week's list data live by
    # then. Adjust if the actual publish cadence turns out to differ.
    - cron: '0 6 * * 3'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Sync bestsellers from NYT into Sanity drafts
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
        run: npm run sync:bestsellers
