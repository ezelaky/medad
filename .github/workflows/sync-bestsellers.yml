name: Sync NYT bestsellers

on:
  schedule:
    # Thursdays 01:00 UTC. NYT's own docs say new lists go live "Wednesday
    # around 7pm ET" — 23:00 UTC during EDT (daylight saving) or 00:00 UTC
    # during EST. 01:00 UTC Thursday gives a safe buffer after either, so
    # this always fetches that week's just-published list, not the prior
    # week's still-current one.
    - cron: '0 1 * * 4'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Sync bestsellers from NYT into Sanity drafts
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
        run: npm run sync:bestsellers
